<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Crear cuenta del jefe — Addbox</title>
  <link rel="icon" type="image/png" href="/admin-dashboard/assets/img/logo-addbox-icon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: 'Inter', 'Segoe UI', sans-serif;
      background: #f5f7fa;
      margin: 0;
      padding: 0;
    }
    .install-wrapper {
      max-width: 500px;
      margin: 60px auto;
      padding: 40px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .install-wrapper h1 {
      color: #1a1a2e;
      margin-bottom: 8px;
      font-size: 1.5rem;
    }
    .install-wrapper p {
      color: #555;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #333;
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 0.95rem;
      box-sizing: border-box;
      transition: border-color 0.2s;
    }
    .form-group input:focus {
      outline: none;
      border-color: #6c5ce7;
    }
    #btn-crear {
      margin-top: 20px;
      width: 100%;
      padding: 12px;
      background: #6c5ce7;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    #btn-crear:hover { background: #5a4bd1; }
    #btn-crear:disabled {
      background: #aaa;
      cursor: not-allowed;
    }
    .status-msg {
      margin-top: 16px;
      padding: 12px;
      border-radius: 6px;
      font-size: 0.9rem;
      display: none;
    }
    .status-msg.error {
      display: block;
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    .status-msg.success {
      display: block;
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
  </style>
</head>
<body>
  <div class="install-wrapper">
    <h1>👤 Crear cuenta del Jefe</h1>
    <p>Introduce tus datos y la master key que te entregó el desarrollador.</p>

    <div class="form-group">
      <label for="nombre">Nombre completo</label>
      <input type="text" id="nombre" placeholder="Ej: Juan Pérez" />
    </div>

    <div class="form-group">
      <label for="correo">Correo electrónico</label>
      <input type="email" id="correo" placeholder="correo@empresa.com" />
    </div>

    <div class="form-group">
      <label for="password">Contraseña</label>
      <input type="password" id="password" placeholder="Mínimo 6 caracteres" />
    </div>

    <div class="form-group">
      <label for="master-key-input">Master Key</label>
      <input type="text" id="master-key-input" placeholder="ADDBOX-OWNER-xxxx-xxxx-xxxx-xxxx" />
    </div>

    <button id="btn-crear">Crear cuenta del jefe</button>

    <div id="status-msg" class="status-msg"></div>
  </div>

  <!-- Supabase v1 CDN (misma versión que el resto del sistema) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@1"></script>

  <!-- Lógica de creación como ES module -->
  <script type="module" src="crear-jefe.js"></script>
</body>
</html>
