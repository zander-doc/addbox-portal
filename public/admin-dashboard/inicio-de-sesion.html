<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>ADDBOX — Acceso</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- CSS del login -->
  <link rel="stylesheet" href="./assets/css/inicio-de-sesion.css">

  <!-- Clerk JS -->
  <script
    async
    crossorigin="anonymous"
    data-clerk-publishable-key="pk_test_bWVldC1kdWNrbGluZy0zNC5jbGVyay5hY2NvdW50cy5kZXYk"
    src="https://cdn.clerk.dev/clerk.js"
  ></script>
</head>

<body>

  <div class="auth-wrapper">

    <!-- CONTENEDOR PRINCIPAL -->
    <div class="auth-card">

      <!-- LOGO -->
      <div class="auth-logo">
        <img src="/admin-dashboard/assets/img/logo-addbox.png" alt="ADDBOX Logo" class="auth-logo-img">
        <p class="brand-sub">Acceso Personal</p>
      </div>

      <!-- LOGIN -->
      <div class="tab-content active" id="login">
        <h2>Bienvenido de nuevo</h2>
        <p class="subtitle">Ingresa tus credenciales</p>

        <!-- Clerk Sign In Component -->
        <div id="clerk-sign-in"></div>

        <div class="login-links">
          <a href="/portal-autoservicio.html" class="back-link">← Volver al portal</a>
        </div>
      </div>

    </div> <!-- auth-card -->

  </div> <!-- auth-wrapper -->

  <!-- Neon + Clerk Auth -->
  <script type="module">
    import { initClerk } from "./services/auth-clerk.js";
    import { configureNeon } from "./services/neon-client.js";

    // =============================================
    // CONFIGURACIÓN INICIAL
    // =============================================
    
    // Configurar Neon (usar variable de entorno o localStorage)
    const neonUrl = window.NEON_DATABASE_URL || localStorage.getItem('NEON_DATABASE_URL');
    if (neonUrl) {
      configureNeon(neonUrl);
    }

    // Inicializar Clerk
    initClerk().then(() => {
      console.log('✅ Clerk listo');
      // Montar componente de sign in de Clerk
      const clerkSignIn = document.getElementById('clerk-sign-in');
      if (clerkSignIn && window.Clerk) {
        window.Clerk.mountSignIn(clerkSignIn, {
          routing: 'hash',
          afterSignInUrl: '/admin-dashboard/modules/dashboard/dashboard.html'
        });
      }
      // Si ya hay sesión activa, redirigir al dashboard
      if (window.ADDBOX?.auth?.isAuthenticated()) {
        window.location.href = "/admin-dashboard/modules/dashboard/dashboard.html";
      }
    }).catch((err) => {
      console.warn('⚠️ Clerk no se pudo inicializar:', err.message);
    });

    // =============================================
    // FORGOT PASSWORD (manejado por Clerk)
    // =============================================
    // El componente de Clerk incluye la opción de recuperación de contraseña

    // =============================================
    // CHECK INSTALLATION STATUS
    // =============================================
    document.addEventListener('DOMContentLoaded', function() {
      fetch('/config/addbox-install.json')
        .then(response => response.ok ? response.json() : null)
        .then(config => {
          if (config && config.first_run === true) {
            const authCard = document.querySelector('.auth-card');
            if (authCard) {
              const installLink = document.createElement('a');
              installLink.href = '/admin-dashboard/instalacion.html';
              installLink.className = 'install-link';
              installLink.textContent = '⚙️ Configuración inicial';
              installLink.style.cssText = `
                display: block; text-align: center; margin-top: 1.5rem;
                color: #666; text-decoration: none; font-size: 0.9rem;
                transition: color 0.2s;
              `;
              installLink.addEventListener('mouseover', function() { installLink.style.color = '#2196F3'; });
              installLink.addEventListener('mouseout', function() { installLink.style.color = '#666'; });
              authCard.appendChild(installLink);
            }
          }
        })
        .catch(() => {});
    });
  </script>

</body>
</html>
