<!-- ============================================================
   ADDBOX — Formulario de Registro de Movimientos de Inventario
   Componente standalone / partial reutilizable
   Tipos: entrada, salida, transferencia, ajuste
============================================================ -->

<div class="modal-overlay" id="modalMovimiento">
  <div class="modal-container movimiento-form-container">
    <!-- Header -->
    <div class="modal-header">
      <h2><i class="fa fa-arrows-rotate"></i> Registrar Movimiento</h2>
      <button type="button" class="modal-close" id="btnCerrarMovimiento" aria-label="Cerrar modal">&times;</button>
    </div>

    <!-- Body -->
    <div class="modal-body">
      <form id="formMovimiento" novalidate>

        <!-- Tipo de movimiento -->
        <div class="form-group">
          <label for="mov-tipo">Tipo de movimiento <span class="required">*</span></label>
          <select id="mov-tipo" required aria-describedby="mov-tipo-error">
            <option value="">Seleccionar tipo...</option>
            <option value="entrada">Entrada</option>
            <option value="salida">Salida</option>
            <option value="transferencia">Transferencia</option>
            <option value="ajuste">Ajuste</option>
          </select>
          <span class="error-message" id="mov-tipo-error" role="alert"></span>
        </div>

        <!-- Producto -->
        <div class="form-group">
          <label for="mov-producto">Producto <span class="required">*</span></label>
          <select id="mov-producto" required aria-describedby="mov-producto-error">
            <option value="">Seleccionar producto...</option>
          </select>
          <span class="error-message" id="mov-producto-error" role="alert"></span>
        </div>

        <!-- Obra origen -->
        <div class="form-group">
          <label for="mov-obra">Obra origen <span class="required">*</span></label>
          <select id="mov-obra" required aria-describedby="mov-obra-error">
            <option value="">Seleccionar obra...</option>
          </select>
          <span class="error-message" id="mov-obra-error" role="alert"></span>
        </div>

        <!-- Obra destino (solo transferencia) -->
        <div class="form-group form-group--dynamic" id="grupoObraDestino" style="display:none;">
          <label for="mov-obra-destino">Obra destino <span class="required">*</span></label>
          <select id="mov-obra-destino" aria-describedby="mov-obra-destino-error">
            <option value="">Seleccionar obra destino...</option>
          </select>
          <span class="error-message" id="mov-obra-destino-error" role="alert"></span>
          <span class="field-hint">La obra destino debe ser diferente a la obra origen</span>
        </div>

        <!-- Cantidad -->
        <div class="form-group">
          <label for="mov-cantidad">Cantidad <span class="required">*</span></label>
          <input
            type="number"
            id="mov-cantidad"
            min="1"
            max="999999"
            step="1"
            required
            placeholder="1 - 999,999"
            aria-describedby="mov-cantidad-error mov-cantidad-hint"
          >
          <span class="error-message" id="mov-cantidad-error" role="alert"></span>
          <span class="field-hint" id="mov-cantidad-hint">
            Rango válido: 1 a 999,999 para entradas/salidas. Para ajustes: -999,999 a 999,999 (excluye 0).
          </span>
        </div>

        <!-- Stock disponible (visible para salida/transferencia) -->
        <div class="form-group form-group--info" id="grupoStockDisponible" style="display:none;">
          <div class="stock-indicator">
            <i class="fa fa-box-open"></i>
            <span>Stock disponible: <strong id="stockDisponibleValor">—</strong></span>
          </div>
        </div>

        <!-- Motivo (solo ajuste) -->
        <div class="form-group form-group--dynamic" id="grupoMotivo" style="display:none;">
          <label for="mov-motivo">Motivo del ajuste <span class="required">*</span></label>
          <textarea
            id="mov-motivo"
            minlength="10"
            maxlength="500"
            rows="3"
            placeholder="Describa el motivo del ajuste (mínimo 10 caracteres)..."
            aria-describedby="mov-motivo-error mov-motivo-counter"
          ></textarea>
          <span class="error-message" id="mov-motivo-error" role="alert"></span>
          <span class="field-counter" id="mov-motivo-counter">0 / 500 caracteres (mín. 10)</span>
        </div>

        <!-- Observación (opcional, todos los tipos) -->
        <div class="form-group">
          <label for="mov-observacion">Observación <span class="optional">(opcional)</span></label>
          <input
            type="text"
            id="mov-observacion"
            maxlength="200"
            placeholder="Nota adicional..."
            aria-describedby="mov-observacion-hint"
          >
          <span class="field-hint" id="mov-observacion-hint">Máximo 200 caracteres</span>
        </div>

        <!-- Acciones -->
        <div class="form-actions">
          <button type="button" class="btn-secondary" id="btnCancelarMovimiento">Cancelar</button>
          <button type="submit" class="btn-primary" id="btnRegistrarMovimiento">
            <i class="fa fa-check"></i> Registrar
          </button>
        </div>

      </form>
    </div>
  </div>
</div>

<!-- ============================================================
   ESTILOS DEL COMPONENTE (scoped)
============================================================ -->
<style>
  /* Container del formulario de movimientos */
  .movimiento-form-container {
    max-width: 540px;
  }

  /* Campos dinámicos — transición suave */
  .form-group--dynamic {
    overflow: hidden;
    transition: max-height 0.3s ease, opacity 0.3s ease, margin 0.3s ease;
    max-height: 0;
    opacity: 0;
    margin-bottom: 0;
  }

  .form-group--dynamic.visible {
    display: block !important;
    max-height: 200px;
    opacity: 1;
    margin-bottom: 16px;
  }

  /* Indicador de stock disponible */
  .stock-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    background: rgba(108, 92, 231, 0.08);
    border: 1px solid rgba(108, 92, 231, 0.2);
    border-radius: 8px;
    font-size: 13px;
    color: var(--text-muted, #9aa0b2);
  }

  .stock-indicator i {
    color: var(--primary, #6c5ce7);
    font-size: 14px;
  }

  .stock-indicator strong {
    color: var(--text-light, #e8e8e8);
    font-weight: 700;
  }

  /* Stock insuficiente */
  .stock-indicator.stock-insuficiente {
    background: rgba(255, 118, 117, 0.08);
    border-color: rgba(255, 118, 117, 0.3);
  }

  .stock-indicator.stock-insuficiente strong {
    color: var(--danger, #ff7675);
  }

  /* Hints de campo */
  .field-hint {
    display: block;
    margin-top: 4px;
    font-size: 11px;
    color: var(--text-muted, #9aa0b2);
    opacity: 0.8;
  }

  /* Contador de caracteres */
  .field-counter {
    display: block;
    margin-top: 4px;
    font-size: 11px;
    color: var(--text-muted, #9aa0b2);
    text-align: right;
  }

  .field-counter.warning {
    color: #f97316;
  }

  .field-counter.valid {
    color: #22c55e;
  }

  /* Etiqueta opcional */
  .optional {
    font-weight: 400;
    font-size: 12px;
    color: var(--text-muted, #9aa0b2);
  }

  /* Validación visual en tiempo real */
  .form-group input.valid,
  .form-group select.valid,
  .form-group textarea.valid {
    border-color: #22c55e;
  }

  .form-group input.error,
  .form-group select.error,
  .form-group textarea.error {
    border-color: var(--danger, #ff7675);
    background: rgba(255, 118, 117, 0.05);
    animation: shake 0.3s ease;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-4px); }
    75% { transform: translateX(4px); }
  }

  /* Ajuste de cantidad para tipo ajuste (permite negativos) */
  #mov-cantidad.ajuste-mode {
    /* Visual cue that negative values are allowed */
  }

  /* Form info group */
  .form-group--info {
    margin-bottom: 16px;
    overflow: hidden;
    transition: max-height 0.3s ease, opacity 0.3s ease;
  }

  /* Responsive */
  @media (max-width: 600px) {
    .movimiento-form-container {
      width: 95%;
      max-width: none;
    }

    .form-actions {
      flex-direction: column-reverse;
    }

    .form-actions button {
      width: 100%;
    }
  }
</style>

<!-- ============================================================
   SCRIPT DEL COMPONENTE — Lógica de campos dinámicos y validación visual
============================================================ -->
<script>
(function() {
  'use strict';

  // === DOM References ===
  const form = document.getElementById('formMovimiento');
  const tipoSelect = document.getElementById('mov-tipo');
  const productoSelect = document.getElementById('mov-producto');
  const obraSelect = document.getElementById('mov-obra');
  const obraDestinoGroup = document.getElementById('grupoObraDestino');
  const obraDestinoSelect = document.getElementById('mov-obra-destino');
  const cantidadInput = document.getElementById('mov-cantidad');
  const motivoGroup = document.getElementById('grupoMotivo');
  const motivoTextarea = document.getElementById('mov-motivo');
  const motivoCounter = document.getElementById('mov-motivo-counter');
  const stockGroup = document.getElementById('grupoStockDisponible');
  const stockValor = document.getElementById('stockDisponibleValor');
  const btnCerrar = document.getElementById('btnCerrarMovimiento');
  const btnCancelar = document.getElementById('btnCancelarMovimiento');
  const modalOverlay = document.getElementById('modalMovimiento');

  // === State ===
  let currentType = '';
  let formData = {}; // Preservar datos en caso de error

  // === Campos dinámicos según tipo ===
  function actualizarCamposDinamicos() {
    const tipo = tipoSelect.value;
    currentType = tipo;

    // Obra destino: solo visible para transferencia
    if (tipo === 'transferencia') {
      obraDestinoGroup.style.display = '';
      obraDestinoGroup.classList.add('visible');
      obraDestinoSelect.setAttribute('required', 'required');
    } else {
      obraDestinoGroup.classList.remove('visible');
      obraDestinoGroup.style.display = 'none';
      obraDestinoSelect.removeAttribute('required');
      obraDestinoSelect.value = '';
      limpiarError('mov-obra-destino');
    }

    // Motivo: solo visible para ajuste
    if (tipo === 'ajuste') {
      motivoGroup.style.display = '';
      motivoGroup.classList.add('visible');
      motivoTextarea.setAttribute('required', 'required');
    } else {
      motivoGroup.classList.remove('visible');
      motivoGroup.style.display = 'none';
      motivoTextarea.removeAttribute('required');
      motivoTextarea.value = '';
      limpiarError('mov-motivo');
      actualizarContadorMotivo();
    }

    // Stock disponible: visible para salida y transferencia
    if (tipo === 'salida' || tipo === 'transferencia') {
      stockGroup.style.display = '';
    } else {
      stockGroup.style.display = 'none';
    }

    // Ajustar rango de cantidad según tipo
    if (tipo === 'ajuste') {
      cantidadInput.setAttribute('min', '-999999');
      cantidadInput.setAttribute('placeholder', '-999,999 a 999,999 (excluye 0)');
      cantidadInput.classList.add('ajuste-mode');
    } else {
      cantidadInput.setAttribute('min', '1');
      cantidadInput.setAttribute('placeholder', '1 - 999,999');
      cantidadInput.classList.remove('ajuste-mode');
    }

    // Limpiar validación del tipo
    if (tipo) {
      limpiarError('mov-tipo');
      tipoSelect.classList.add('valid');
    }
  }

  // === Validación en tiempo real ===
  function validarCampo(campo, condicion, errorId, mensaje) {
    const errorEl = document.getElementById(errorId);
    if (!condicion) {
      campo.classList.add('error');
      campo.classList.remove('valid');
      if (errorEl) errorEl.textContent = mensaje;
      return false;
    } else {
      campo.classList.remove('error');
      campo.classList.add('valid');
      if (errorEl) errorEl.textContent = '';
      return true;
    }
  }

  function limpiarError(campoId) {
    const campo = document.getElementById(campoId);
    const errorEl = document.getElementById(campoId + '-error');
    if (campo) {
      campo.classList.remove('error');
      campo.classList.remove('valid');
    }
    if (errorEl) errorEl.textContent = '';
  }

  function validarTipo() {
    return validarCampo(
      tipoSelect,
      tipoSelect.value !== '',
      'mov-tipo-error',
      'Seleccione un tipo de movimiento'
    );
  }

  function validarProducto() {
    return validarCampo(
      productoSelect,
      productoSelect.value !== '',
      'mov-producto-error',
      'Seleccione un producto'
    );
  }

  function validarObra() {
    return validarCampo(
      obraSelect,
      obraSelect.value !== '',
      'mov-obra-error',
      'Seleccione una obra'
    );
  }

  function validarObraDestino() {
    if (currentType !== 'transferencia') return true;
    const valido = obraDestinoSelect.value !== '' && obraDestinoSelect.value !== obraSelect.value;
    let mensaje = '';
    if (obraDestinoSelect.value === '') {
      mensaje = 'Seleccione una obra destino';
    } else if (obraDestinoSelect.value === obraSelect.value) {
      mensaje = 'La obra destino debe ser diferente a la obra origen';
    }
    return validarCampo(obraDestinoSelect, valido, 'mov-obra-destino-error', mensaje);
  }

  function validarCantidad() {
    const valor = cantidadInput.value.trim();
    const num = Number(valor);
    let valido = true;
    let mensaje = '';

    if (valor === '' || isNaN(num)) {
      valido = false;
      mensaje = 'Ingrese una cantidad válida';
    } else if (!Number.isInteger(num)) {
      valido = false;
      mensaje = 'La cantidad debe ser un número entero';
    } else if (currentType === 'ajuste') {
      if (num === 0) {
        valido = false;
        mensaje = 'La cantidad no puede ser cero para ajustes';
      } else if (num < -999999 || num > 999999) {
        valido = false;
        mensaje = 'Rango válido: -999,999 a 999,999';
      }
    } else {
      if (num < 1) {
        valido = false;
        mensaje = 'La cantidad mínima es 1';
      } else if (num > 999999) {
        valido = false;
        mensaje = 'La cantidad máxima es 999,999';
      }
    }

    return validarCampo(cantidadInput, valido, 'mov-cantidad-error', mensaje);
  }

  function validarMotivo() {
    if (currentType !== 'ajuste') return true;
    const valor = motivoTextarea.value.trim();
    let valido = true;
    let mensaje = '';

    if (valor.length === 0) {
      valido = false;
      mensaje = 'El motivo es obligatorio para ajustes';
    } else if (valor.length < 10) {
      valido = false;
      mensaje = `El motivo debe tener al menos 10 caracteres (actual: ${valor.length})`;
    }

    return validarCampo(motivoTextarea, valido, 'mov-motivo-error', mensaje);
  }

  // === Contador de caracteres del motivo ===
  function actualizarContadorMotivo() {
    const len = motivoTextarea.value.length;
    motivoCounter.textContent = `${len} / 500 caracteres (mín. 10)`;

    motivoCounter.classList.remove('warning', 'valid');
    if (len > 0 && len < 10) {
      motivoCounter.classList.add('warning');
    } else if (len >= 10) {
      motivoCounter.classList.add('valid');
    }
  }

  // === Validar formulario completo ===
  function validarFormulario() {
    const resultados = [
      validarTipo(),
      validarProducto(),
      validarObra(),
      validarObraDestino(),
      validarCantidad(),
      validarMotivo()
    ];
    return resultados.every(r => r === true);
  }

  // === Preservar datos del formulario ===
  function guardarDatosFormulario() {
    formData = {
      tipo: tipoSelect.value,
      producto: productoSelect.value,
      obra: obraSelect.value,
      obraDestino: obraDestinoSelect.value,
      cantidad: cantidadInput.value,
      motivo: motivoTextarea.value,
      observacion: document.getElementById('mov-observacion').value
    };
  }

  function restaurarDatosFormulario() {
    if (formData.tipo) tipoSelect.value = formData.tipo;
    if (formData.producto) productoSelect.value = formData.producto;
    if (formData.obra) obraSelect.value = formData.obra;
    if (formData.obraDestino) obraDestinoSelect.value = formData.obraDestino;
    if (formData.cantidad) cantidadInput.value = formData.cantidad;
    if (formData.motivo) motivoTextarea.value = formData.motivo;
    if (formData.observacion) document.getElementById('mov-observacion').value = formData.observacion;
    actualizarCamposDinamicos();
    actualizarContadorMotivo();
  }

  // === Limpiar formulario ===
  function limpiarFormulario() {
    form.reset();
    formData = {};
    currentType = '';
    obraDestinoGroup.style.display = 'none';
    obraDestinoGroup.classList.remove('visible');
    motivoGroup.style.display = 'none';
    motivoGroup.classList.remove('visible');
    stockGroup.style.display = 'none';
    stockValor.textContent = '—';
    cantidadInput.setAttribute('min', '1');
    cantidadInput.setAttribute('placeholder', '1 - 999,999');
    cantidadInput.classList.remove('ajuste-mode');
    actualizarContadorMotivo();

    // Limpiar todas las clases de validación
    form.querySelectorAll('.error, .valid').forEach(el => {
      el.classList.remove('error', 'valid');
    });
    form.querySelectorAll('.error-message').forEach(el => {
      el.textContent = '';
    });
  }

  // === Abrir/Cerrar modal ===
  function abrirModal() {
    modalOverlay.classList.add('show');
    modalOverlay.style.display = 'flex';
    // Si hay datos preservados, restaurar
    if (formData.tipo) {
      restaurarDatosFormulario();
    }
    // Focus en el primer campo
    setTimeout(() => tipoSelect.focus(), 100);
  }

  function cerrarModal() {
    modalOverlay.classList.remove('show');
    modalOverlay.style.display = 'none';
    limpiarFormulario();
  }

  // === Event Listeners ===

  // Cambio de tipo → campos dinámicos
  tipoSelect.addEventListener('change', actualizarCamposDinamicos);

  // Validación en tiempo real de cada campo
  tipoSelect.addEventListener('change', validarTipo);
  productoSelect.addEventListener('change', validarProducto);
  obraSelect.addEventListener('change', validarObra);
  obraDestinoSelect.addEventListener('change', validarObraDestino);
  cantidadInput.addEventListener('input', validarCantidad);
  motivoTextarea.addEventListener('input', function() {
    actualizarContadorMotivo();
    validarMotivo();
  });

  // Cerrar modal
  if (btnCerrar) btnCerrar.addEventListener('click', cerrarModal);
  if (btnCancelar) btnCancelar.addEventListener('click', cerrarModal);

  // Cerrar con click en overlay
  modalOverlay.addEventListener('click', function(e) {
    if (e.target === modalOverlay) cerrarModal();
  });

  // Cerrar con Escape
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && modalOverlay.style.display === 'flex') {
      cerrarModal();
    }
  });

  // Submit del formulario
  form.addEventListener('submit', function(e) {
    e.preventDefault();
    guardarDatosFormulario();

    if (!validarFormulario()) {
      // Preservar datos — no limpiar
      return;
    }

    // Dispatch custom event para que el controller maneje el envío
    const evento = new CustomEvent('movimiento:submit', {
      detail: {
        tipo: tipoSelect.value,
        productoId: productoSelect.value,
        obraId: obraSelect.value,
        obraDestinoId: obraDestinoSelect.value || null,
        cantidad: Number(cantidadInput.value),
        motivo: motivoTextarea.value.trim() || null,
        observacion: document.getElementById('mov-observacion').value.trim() || null
      },
      bubbles: true
    });
    form.dispatchEvent(evento);
  });

  // === API pública del componente ===
  window.MovimientosForm = {
    abrir: abrirModal,
    cerrar: cerrarModal,
    limpiar: limpiarFormulario,
    preservarDatos: guardarDatosFormulario,
    restaurarDatos: restaurarDatosFormulario,
    validar: validarFormulario,
    mostrarError: function(campo, mensaje) {
      const el = document.getElementById(campo);
      const errorEl = document.getElementById(campo + '-error');
      if (el) {
        el.classList.add('error');
        el.classList.remove('valid');
      }
      if (errorEl) errorEl.textContent = mensaje;
    },
    actualizarStock: function(cantidad) {
      stockValor.textContent = cantidad !== null ? cantidad.toLocaleString('es-MX') : '—';
      const indicator = stockValor.closest('.stock-indicator');
      if (indicator) {
        indicator.classList.toggle('stock-insuficiente',
          cantidad !== null && Number(cantidadInput.value) > cantidad
        );
      }
    },
    cargarProductos: function(productos) {
      productoSelect.innerHTML = '<option value="">Seleccionar producto...</option>';
      productos.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p.id;
        opt.textContent = `${p.codigo} — ${p.descripcion}`;
        productoSelect.appendChild(opt);
      });
    },
    cargarObras: function(obras) {
      const opciones = '<option value="">Seleccionar obra...</option>' +
        obras.map(o => `<option value="${o.id}">${o.nombre}</option>`).join('');
      obraSelect.innerHTML = opciones;
      obraDestinoSelect.innerHTML = opciones.replace('Seleccionar obra...', 'Seleccionar obra destino...');
    },
    getDatos: function() {
      return {
        tipo: tipoSelect.value,
        productoId: productoSelect.value,
        obraId: obraSelect.value,
        obraDestinoId: obraDestinoSelect.value || null,
        cantidad: Number(cantidadInput.value),
        motivo: motivoTextarea.value.trim() || null,
        observacion: document.getElementById('mov-observacion').value.trim() || null
      };
    }
  };

})();
</script>
