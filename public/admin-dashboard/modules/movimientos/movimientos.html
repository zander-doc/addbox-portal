<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Movimientos - ADDBOX Inventory</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="../../assets/css/base.css">
  <link rel="stylesheet" href="../../assets/css/layout.css">
  <link rel="stylesheet" href="../../assets/css/dashboard.css">
  <link rel="stylesheet" href="../../assets/css/toast.css">
  <link rel="icon" type="image/png" href="/admin-dashboard/assets/img/logo-addbox-icon.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:1000; align-items:center; justify-content:center; }
    .modal-overlay.show { display:flex; }
    .modal-card { background:#1a1a2e; border-radius:12px; padding:24px; width:90%; max-width:500px; }
    .modal-card h3 { margin-bottom:16px; }
    .modal-card label { display:block; font-size:0.8rem; margin-top:10px; color:#9ca3af; }
    .modal-card input, .modal-card select, .modal-card textarea { width:100%; padding:8px 12px; border:1px solid #333; border-radius:6px; background:#111; color:#fff; margin-top:4px; }
    .modal-card input:focus, .modal-card select:focus { border-color:#6c5ce7; outline:none; }
    .modal-card .modal-actions { display:flex; gap:10px; margin-top:16px; }
    .modal-card .modal-actions button { padding:8px 16px; border:none; border-radius:6px; cursor:pointer; transition:opacity 0.2s; }
    .modal-card .modal-actions button:disabled { opacity:0.6; cursor:not-allowed; }
    .btn-save { background:#6c5ce7; color:#fff; }
    .btn-save:hover:not(:disabled) { background:#5a4bd4; }
    .btn-cancel { background:#333; color:#fff; }
    .btn-cancel:hover { background:#444; }
    .hidden { display:none !important; }
    .badge-mov { padding:4px 10px; border-radius:6px; font-size:12px; font-weight:600; }
    .badge-entrada { background:rgba(34,197,94,0.15); color:#22c55e; }
    .badge-salida { background:rgba(239,68,68,0.15); color:#ef4444; }
    .table-container { overflow-x:auto; position:relative; z-index:1; }
    .loading { display:none; position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); color:#9ca3af; font-size:14px; z-index:10; }
    .filtros-movimientos { display:flex; flex-wrap:wrap; gap:16px; align-items:flex-end; margin-bottom:20px; z-index:10; position:relative; }
    .filtro-item { min-width:180px; }
    .filtro-botones { display:flex; gap:12px; align-items:flex-end; }

    /* Botones premium - Filtrar */
    .btn-filtrar-premium {
      background: linear-gradient(135deg, #6c5ce7, #00d2ff);
      border: none;
      padding: 10px 20px;
      border-radius: 10px;
      color: white;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 4px 15px rgba(108, 92, 231, 0.3);
      position: relative;
      overflow: hidden;
    }
    .btn-filtrar-premium:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(108, 92, 231, 0.5);
    }
    .btn-filtrar-premium::after {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: rgba(255,255,255,0.15);
      transition: 0.4s;
    }
    .btn-filtrar-premium:hover::after {
      left: 0;
    }

    /* Botones premium - Limpiar */
    .btn-limpiar-premium {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.15);
      padding: 10px 20px;
      border-radius: 10px;
      color: #9aa0b2;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
      backdrop-filter: blur(8px);
    }
    .btn-limpiar-premium:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.25);
      color: #e8e8e8;
      transform: translateY(-2px);
    }

    /* Botones premium - Paginación */
    .btn-paginacion {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      padding: 10px 18px;
      border-radius: 10px;
      color: #e8e8e8;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .btn-paginacion:hover:not(:disabled) {
      background: linear-gradient(135deg, rgba(108, 92, 231, 0.2), rgba(0, 210, 255, 0.1));
      border-color: rgba(108, 92, 231, 0.4);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(108, 92, 231, 0.2);
    }
    .btn-paginacion:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* Botón premium - Exportar */
    .btn-exportar-premium {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(34, 197, 94, 0.3);
      padding: 10px 20px;
      border-radius: 10px;
      color: #22c55e;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .btn-exportar-premium:hover {
      background: rgba(34, 197, 94, 0.1);
      border-color: rgba(34, 197, 94, 0.5);
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(34, 197, 94, 0.2);
    }

    /* Sección paginación premium */
    .paginacion-section {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 14px 20px;
    }
    .paginacion-info {
      color: #9aa0b2;
      font-size: 14px;
      font-weight: 500;
    }
    .paginacion-botones {
      display: flex;
      gap: 10px;
    }
  </style>
</head>
<body>
  <div class="main-layout">
    <div id="sidebar-container"></div>
    <main class="content">
      <div class="dashboard-center" style="gap: 30px;">
        <header class="topbar">
          <h1>Movimientos de Inventario</h1>
          <div class="top-actions">
            <button class="primary" onclick="abrirModalCrear()" style="padding:8px 16px;">
              <i class="fa fa-plus"></i> Nuevo movimiento
            </button>
            <button class="logout-btn" onclick="logout()" style="padding:8px 16px;">
              <i class="fa fa-right-from-bracket"></i> Salir
            </button>
          </div>
        </header>

        <!-- KPIs -->
        <section class="grid-cards">
          <div class="card" style="padding:18px;">
            <div>
              <div class="card-title" style="font-size:13px;">Total movimientos</div>
              <div class="card-value" id="kpiTotal" style="font-size:26px;">—</div>
            </div>
            <i class="fa fa-exchange-alt" style="font-size:28px;"></i>
          </div>
          <div class="card" style="padding:18px;">
            <div>
              <div class="card-title" style="font-size:13px;">Entradas</div>
              <div class="card-value" id="kpiEntradas" style="font-size:26px;color:#22c55e;">—</div>
            </div>
            <i class="fa fa-arrow-down" style="font-size:28px;color:#22c55e;"></i>
          </div>
          <div class="card" style="padding:18px;">
            <div>
              <div class="card-title" style="font-size:13px;">Salidas</div>
              <div class="card-value" id="kpiSalidas" style="font-size:26px;color:#ef4444;">—</div>
            </div>
            <i class="fa fa-arrow-up" style="font-size:28px;color:#ef4444;"></i>
          </div>
        </section>

        <!-- Filtros -->
        <section class="card" style="padding:16px;">
          <div class="filtros-movimientos">
            <div class="filtro-item">
              <label style="font-size:0.8rem;color:#9ca3af;">Tipo</label>
              <select id="filtroTipo" style="width:100%;padding:8px 12px;border:1px solid #333;border-radius:6px;background:#111;color:#fff;">
                <option value="">Todos</option>
                <option value="entrada">Entrada</option>
                <option value="salida">Salida</option>
              </select>
            </div>
            <div class="filtro-item">
              <label style="font-size:0.8rem;color:#9ca3af;">Obra</label>
              <select id="filtroObra" style="width:100%;padding:8px 12px;border:1px solid #333;border-radius:6px;background:#111;color:#fff;">
                <option value="">Todas las obras</option>
              </select>
            </div>
            <div class="filtro-item">
              <label style="font-size:0.8rem;color:#9ca3af;">Desde</label>
              <input type="date" id="filtroDesde" style="width:100%;padding:8px 12px;border:1px solid #333;border-radius:6px;background:#111;color:#fff;">
            </div>
            <div class="filtro-item">
              <label style="font-size:0.8rem;color:#9ca3af;">Hasta</label>
              <input type="date" id="filtroHasta" style="width:100%;padding:8px 12px;border:1px solid #333;border-radius:6px;background:#111;color:#fff;">
            </div>
            <div class="filtro-botones">
              <button id="btnFiltrar" class="btn-filtrar-premium">
                <i class="fa fa-filter"></i> Filtrar
              </button>
              <button id="btnLimpiar" class="btn-limpiar-premium">
                <i class="fa fa-eraser"></i> Limpiar
              </button>
            </div>
          </div>
        </section>

        <!-- Tabla de movimientos -->
        <section class="historial">
          <div class="table-container">
            <div id="movimientos-loading" class="loading">Cargando movimientos...</div>
            <table class="dashboard-table">
              <thead>
                <tr>
                  <th>Fecha</th>
                  <th>Hora</th>
                  <th>Producto</th>
                  <th>Tipo</th>
                  <th>Cantidad</th>
                  <th>Costo Unitario (USD)</th>
                  <th>Motivo</th>
                  <th>Acciones</th>
                </tr>
              </thead>
              <tbody id="movTbody"></tbody>
            </table>
          </div>
        </section>

        <!-- Paginación -->
        <section class="paginacion-section">
          <span id="paginaInfo" class="paginacion-info">Página 1 de 1</span>
          <div class="paginacion-botones">
            <button id="btnPrev" class="btn-paginacion">
              <i class="fa fa-chevron-left"></i> Anterior
            </button>
            <button id="btnNext" class="btn-paginacion">
              Siguiente <i class="fa fa-chevron-right"></i>
            </button>
          </div>
        </section>

        <!-- Exportar -->
        <section style="display:flex;justify-content:flex-end;">
          <button id="btnExportar" class="btn-exportar-premium">
            <i class="fa fa-file-excel"></i> Exportar Excel
          </button>
        </section>
      </div>
    </main>
  </div>

  <!-- Modal Crear -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-card">
      <h3>Nuevo Movimiento</h3>
      <form id="movimientoForm">
        <label>Producto *</label>
        <select id="producto_id" required>
          <option value="">Cargando productos...</option>
        </select>
        <label>Tipo *</label>
        <select id="tipo" required>
          <option value="entrada">Entrada</option>
          <option value="salida">Salida</option>
        </select>
        <label>Cantidad *</label>
        <input type="number" id="cantidad" min="0.01" step="0.01" required placeholder="0.00">
        <label>Costo Unitario (USD) *</label>
        <input type="number" id="costo_unitario" min="0" step="0.01" required placeholder="0.00">
        <label>Fecha *</label>
        <input type="date" id="fecha" required>
        <label>Motivo</label>
        <input type="text" id="motivo" placeholder="Ej: Recepción de inventario inicial">
        <label>Observación</label>
        <textarea id="observacion" rows="3" placeholder="Notas adicionales..."></textarea>
        <div class="modal-actions">
          <button type="submit" class="btn-save">Guardar</button>
          <button type="button" class="btn-cancel" onclick="cerrarModalCrear()">Cancelar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal Editar -->
  <div class="modal-overlay hidden" id="modalEditar">
    <div class="modal-card">
      <h3>Editar Movimiento</h3>
      <form id="formEditar">
        <input type="hidden" id="edit_id">
        <label>Tipo *</label>
        <select id="edit_tipo" required>
          <option value="entrada">Entrada</option>
          <option value="salida">Salida</option>
        </select>
        <label>Cantidad *</label>
        <input type="number" id="edit_cantidad" min="0.01" step="0.01" required placeholder="0.00">
        <label>Costo Unitario (USD) *</label>
        <input type="number" id="edit_costo_unitario" min="0" step="0.01" required placeholder="0.00">
        <label>Fecha *</label>
        <input type="date" id="edit_fecha" required>
        <label>Motivo</label>
        <input type="text" id="edit_motivo" placeholder="Ej: Ajuste de inventario">
        <label>Observación</label>
        <textarea id="edit_observacion" rows="3" placeholder="Notas adicionales..."></textarea>
        <div class="modal-actions">
          <button type="submit" class="btn-save">Guardar cambios</button>
          <button type="button" class="btn-cancel" onclick="cerrarModalEditar()">Cancelar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@1"></script>
  <script src="../../services/supabase-simple.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script src="../../assets/js/sidebar.js"></script>
  <script type="module" src="./movimientos.service.js"></script>
  <script type="module" src="./movimientos.controller.js"></script>
</body>
</html>
