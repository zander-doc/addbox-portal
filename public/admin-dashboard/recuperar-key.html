<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recuperar contraseña — ADDBOX</title>
  <link rel="stylesheet" href="./assets/css/inicio-de-sesion.css" />
  <link rel="icon" type="image/png" href="/admin-dashboard/assets/img/logo-addbox-icon.png" />
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-logo">
        <img src="/admin-dashboard/assets/img/logo-addbox.png" alt="ADDBOX Logo" class="auth-logo-img">
        <p class="brand-sub">Recuperar acceso</p>
      </div>

      <h2>Recuperación de contraseña</h2>
      <p class="subtitle">Ingresa tu correo para recibir un enlace de recuperación.</p>

      <form id="recover-form">
        <div class="input-group">
          <input type="email" id="recover-email" placeholder="Correo electrónico" required>
        </div>
        <button type="submit" class="btn-primary">Enviar enlace</button>
      </form>

      <p id="recover-message" class="error"></p>

      <div class="login-links">
        <a href="/admin-dashboard/inicio-de-sesion.html" class="back-link">← Volver al login</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@1"></script>
  <script>
    const SUPABASE_URL = "https://billwldqxupcavzurljo.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJpbGx3bGRxeHVwY2F2enVybGpvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNDAzODIsImV4cCI6MjA5MTgxNjM4Mn0.4jsINbwwL9RMjKMdnQu-nYM7qBLb9KIXhEsuXQrEGO8";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    document.getElementById("recover-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = document.getElementById("recover-email").value;
      const msg = document.getElementById("recover-message");

      msg.textContent = "Enviando...";
      msg.style.color = "#8ab4ff";

      const { error } = await supabase.auth.api.resetPasswordForEmail(email);

      if (error) {
        msg.textContent = "Error: " + error.message;
        msg.style.color = "#ff4d4d";
        return;
      }

      msg.textContent = "✅ Se ha enviado un enlace de recuperación a tu correo.";
      msg.style.color = "#28a745";
    });
  </script>
</body>
</html>
