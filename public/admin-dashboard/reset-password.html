<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Restablecer contraseña — ADDBOX</title>
  <link rel="stylesheet" href="./assets/css/inicio-de-sesion.css" />
  <link rel="icon" type="image/png" href="/admin-dashboard/assets/img/logo-addbox-icon.png" />
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-logo">
        <img src="/admin-dashboard/assets/img/logo-addbox.png" alt="ADDBOX Logo" class="auth-logo-img">
        <p class="brand-sub">Restablecer acceso</p>
      </div>

      <h2>Restablecer contraseña</h2>
      <p class="subtitle">Ingresa tu nueva contraseña.</p>

      <form id="reset-form">
        <div class="input-group password-group">
          <input type="password" id="new-password" placeholder="Nueva contraseña" required>
          <span class="toggle-password" data-target="new-password">👁️</span>
        </div>
        <button type="submit" class="btn-primary">Actualizar contraseña</button>
      </form>

      <p id="reset-message" class="error"></p>

      <div class="login-links">
        <a href="/admin-dashboard/inicio-de-sesion.html" class="back-link">← Volver al login</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@1"></script>
  <script>
    const SUPABASE_URL = "https://billwldqxupcavzurljo.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJpbGx3bGRxeHVwY2F2enVybGpvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNDAzODIsImV4cCI6MjA5MTgxNjM4Mn0.4jsINbwwL9RMjKMdnQu-nYM7qBLb9KIXhEsuXQrEGO8";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Obtener token desde la URL
    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);
    const access_token = params.get("access_token");
    const msg = document.getElementById("reset-message");

    if (!access_token) {
      msg.textContent = "Token invalido o expirado. Solicita un nuevo enlace.";
      msg.style.color = "#ff4d4d";
      document.getElementById("reset-form").style.display = "none";
    }

    document.getElementById("reset-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const newPassword = document.getElementById("new-password").value;

      if (newPassword.length < 6) {
        msg.textContent = "La contraseña debe tener al menos 6 caracteres.";
        msg.style.color = "#ff4d4d";
        return;
      }

      msg.textContent = "Actualizando...";
      msg.style.color = "#8ab4ff";

      const { error } = await supabase.auth.api.updateUser(access_token, {
        password: newPassword
      });

      if (error) {
        msg.textContent = "Error: " + error.message;
        msg.style.color = "#ff4d4d";
        return;
      }

      msg.textContent = "Contraseña actualizada correctamente. Redirigiendo...";
      msg.style.color = "#28a745";

      setTimeout(() => {
        window.location.href = "/admin-dashboard/inicio-de-sesion.html";
      }, 2000);
    });

    // Toggle password visibility
    document.querySelector(".toggle-password").addEventListener("click", function() {
      const target = document.getElementById(this.dataset.target);
      target.type = target.type === "password" ? "text" : "password";
    });
  </script>
</body>
</html>
