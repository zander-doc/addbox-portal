<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>Abrir Ticket — ADDBOX Soporte</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="/soporte/soporte-dark.css">
<style>
body { font-family:'Inter',sans-serif; background:#f0f2f5; padding:40px; }
.container { max-width:700px; margin:auto; }
h1 { font-size:2rem; margin-bottom:10px; }
form { background:#fff; padding:24px; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,0.06); }
label { display:block; margin-top:12px; font-weight:600; }
input, textarea {
width:100%; padding:10px; border:1px solid #ccc; border-radius:6px; margin-top:6px;
}
button {
margin-top:20px; padding:12px 20px; background:#6c5ce7; color:#fff;
border:none; border-radius:6px; cursor:pointer; font-size:1rem;
}
a { color:#6c5ce7; }
</style>
</head>
<body>
<div class="container">
<h1>🎫 Abrir Ticket de Soporte</h1>
<p>Describe tu problema y el equipo de ADDBOX te asistirá.</p>

<form>
<label>Nombre</label>
<input type="text" placeholder="Tu nombre">

<label>Correo electrónico</label>
<input type="email" placeholder="tu@email.com">

<label>Descripción del problema</label>
<textarea rows="6" placeholder="Explica tu problema con detalle..."></textarea>

<button type="submit">Enviar Ticket</button>
</form>

<p style="margin-top:20px;"><a href="/soporte/index.html">← Volver al Centro de Soporte</a></p>
</div>
</body>
</html>
