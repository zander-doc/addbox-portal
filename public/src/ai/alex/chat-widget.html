<!-- Panel lateral de Alex -->
<div id="alexPanel" class="alex-panel">
  <div class="alex-header">
    <span>Alex de ADDBOX</span>
    <button id="alexClose">×</button>
  </div>
  <div id="alexMessages" class="alex-messages"></div>
  <div class="alex-input-area">
    <input id="alexInput" type="text" placeholder="Escribe aquí..." />
    <button id="alexSend">Enviar</button>
  </div>
</div>

<!-- Botón flotante para abrir el panel -->
<button id="alexButton" class="alex-button">Alex</button>
